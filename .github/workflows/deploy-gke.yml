name: Deploy to GKE

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (for example: latest or short SHA)"
        required: true
        default: latest
        type: string
  workflow_run:
    workflows:
      - Build and Push Images
    types:
      - completed

permissions:
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || 'crypto-compliance' }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME || 'crypto-compliance-gke' }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION || 'us-central1-a' }}
  GKE_NAMESPACE: ${{ vars.GKE_NAMESPACE || 'crypto-compliance' }}
  BACKEND_IMAGE_NAME: crypto-compliance-backend
  FRONTEND_IMAGE_NAME: crypto-compliance-frontend
  BACKEND_DEPLOYMENT_NAME: crypto-compliance-backend
  FRONTEND_DEPLOYMENT_NAME: crypto-compliance-frontend

jobs:
  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.14.0

      - name: Setup kubectl
        run: |
          KUBECTL_VERSION="v1.34.5"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          curl -fsSLo kubectl.sha256 "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Verify toolchain versions
        run: |
          node -v
          pnpm -v
          kubectl version --client

      - name: Select image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "Image tag is empty" >&2
            exit 1
          fi

          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Deploying image tag: ${IMAGE_TAG}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2.1.13
        with:
          project_id: ${{ env.PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2.3.1
        with:
          project_id: ${{ env.PROJECT_ID }}
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}

      - name: Deploy backend and frontend
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          BACKEND_IMAGE="${GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}"
          FRONTEND_IMAGE="${GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}"

          kubectl -n "${GKE_NAMESPACE}" set image "deployment/${BACKEND_DEPLOYMENT_NAME}" "*=${BACKEND_IMAGE}"
          kubectl -n "${GKE_NAMESPACE}" rollout status "deployment/${BACKEND_DEPLOYMENT_NAME}" --timeout=5m

          kubectl -n "${GKE_NAMESPACE}" set image "deployment/${FRONTEND_DEPLOYMENT_NAME}" "*=${FRONTEND_IMAGE}"
          kubectl -n "${GKE_NAMESPACE}" rollout status "deployment/${FRONTEND_DEPLOYMENT_NAME}" --timeout=5m

      - name: Show deployed images
        run: |
          kubectl -n "${GKE_NAMESPACE}" get deployment "${BACKEND_DEPLOYMENT_NAME}" -o jsonpath='{.spec.template.spec.containers[*].image}{"\n"}'
          kubectl -n "${GKE_NAMESPACE}" get deployment "${FRONTEND_DEPLOYMENT_NAME}" -o jsonpath='{.spec.template.spec.containers[*].image}{"\n"}'
